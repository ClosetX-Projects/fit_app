<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#8b6adf" />
    <title>FitAssist offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fbff;
        color: #252d4a;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(221, 211, 255, 0.75), transparent 360px),
          radial-gradient(circle at top right, rgba(207, 238, 255, 0.85), transparent 320px),
          #f8fbff;
      }
      main {
        width: min(100%, 420px);
        border: 1px solid rgba(139, 106, 223, 0.18);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.86);
        padding: 28px;
        box-shadow: 0 24px 70px rgba(79, 90, 140, 0.16);
      }
      img {
        width: 72px;
        height: 72px;
        border-radius: 24px;
        display: block;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.45rem;
        line-height: 1.15;
        color: #6f54ca;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: #5d6682;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="" />
      <h1>Sem conexão no momento</h1>
      <p>Quando a internet voltar, abra o FitAssist novamente para sincronizar dados e continuar usando o app.</p>
    </main>
  </body>
</html>
